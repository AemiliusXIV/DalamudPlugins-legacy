name: Update manifest

on:
  schedule:
    - cron: '17 * * * *'  # hourly, offset to spread runner load
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync versions from upstream releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          while read -r entry; do
            name=$(echo "$entry" | jq -r '.InternalName')
            owner=$(echo "$entry" | jq -r '.Owner')
            repo=$(echo "$entry" | jq -r '.Repo')

            latest=$(gh api "repos/$owner/$repo/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
            if [ -z "$latest" ]; then
              echo "No releases yet for $owner/$repo — skipping $name"
              continue
            fi

            current=$(jq -r --arg n "$name" '.[] | select(.InternalName==$n) | .AssemblyVersion' pluginmaster.json)

            if [ -z "$current" ]; then
              echo "WARNING: $name listed in plugins.json but missing from pluginmaster.json — skipping"
              continue
            fi

            # Sync AssemblyVersion
            if [ "$latest" != "$current" ]; then
              echo "Updating $name: $current -> $latest"
              jq --arg n "$name" --arg v "$latest" \
                '(.[] | select(.InternalName==$n) | .AssemblyVersion) = $v' \
                pluginmaster.json > pluginmaster.json.tmp
              mv pluginmaster.json.tmp pluginmaster.json
            else
              echo "$name up to date ($current)"
            fi

            # Sync DalamudApiLevel from the manifest inside the release zip
            zip_url="https://github.com/$owner/$repo/releases/latest/download/latest.zip"
            if curl -fsSL "$zip_url" -o plugin.zip 2>/dev/null; then
              zip_api=$(unzip -p plugin.zip "${name}.json" 2>/dev/null | jq '.DalamudApiLevel // empty' 2>/dev/null || echo "")
              rm -f plugin.zip
              if [ -n "$zip_api" ]; then
                repo_api=$(jq --arg n "$name" '.[] | select(.InternalName==$n) | .DalamudApiLevel' pluginmaster.json)
                if [ "$zip_api" != "$repo_api" ]; then
                  echo "Updating DalamudApiLevel for $name: $repo_api -> $zip_api"
                  jq --arg n "$name" --argjson v "$zip_api" \
                    '(.[] | select(.InternalName==$n) | .DalamudApiLevel) = $v' \
                    pluginmaster.json > pluginmaster.json.tmp
                  mv pluginmaster.json.tmp pluginmaster.json
                fi
              fi
            else
              rm -f plugin.zip
              echo "Could not download zip for $name — DalamudApiLevel not synced"
            fi

          done < <(jq -c '.[]' plugins.json)

      - name: Commit and push if changed
        run: |
          if git diff --quiet pluginmaster.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "Sync plugin versions from upstream releases"
          git push
